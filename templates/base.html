<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="../static/styles.css" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <div>
        <h1>{{TITLE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
      </div>
      <div class="header-actions">
        <div class="badge">Base de conocimiento generada con Python</div>
        <nav class="page-links">
          {{PAGE_LINKS}}
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="intro-grid">
        <div class="card">
          <h2 class="section-title">Cómo usar esta base</h2>
          <p>{{INTRO_HOW_TO_USE}}</p>
        </div>
        <div class="card">
          <h2 class="section-title">Escalabilidad</h2>
          <p>{{INTRO_SCALABILITY}}</p>
        </div>
      </section>

      <section class="card filters-card">
        <h2 class="section-title">Buscar y filtrar</h2>
        <div class="filters-grid">
          <div>
            <label class="label" for="searchInput">Buscar</label>
            <input type="text" id="searchInput" placeholder="Escribe comando, problema, tag o descripción..." />
          </div>
          <div>
            <label class="label" for="tagFilter">Filtrar por tag</label>
            <select id="tagFilter">
              {{TAG_OPTIONS}}
            </select>
          </div>
        </div>
        <p id="resultsInfo" class="results-info">Mostrando todas las entradas.</p>
      </section>

      <div class="layout">
        <aside class="card">
          <div class="nav-title">Secciones</div>
          <nav class="nav-list">
            {{NAV}}
          </nav>
        </aside>

        <div class="sections">
          {{SECTIONS}}
        </div>
      </div>
    </div>
  </main>

  <script>
    const searchInput = document.getElementById("searchInput");
    const tagFilter = document.getElementById("tagFilter");
    const resultsInfo = document.getElementById("resultsInfo");
    const items = Array.from(document.querySelectorAll(".searchable-item"));

    function updateFilters() {
      const searchText = searchInput.value.trim().toLowerCase();
      const selectedTag = tagFilter.value.trim().toLowerCase();

      let visibleCount = 0;

      items.forEach((item) => {
        const itemSearch = item.dataset.search || "";
        const itemTags = item.dataset.tags || "";

        const matchesSearch = !searchText || itemSearch.includes(searchText);
        const matchesTag = !selectedTag || itemTags.split(" ").includes(selectedTag);

        const shouldShow = matchesSearch && matchesTag;

        item.style.display = shouldShow ? "" : "none";

        if (shouldShow) {
          visibleCount += 1;
        }
      });

      if (!searchText && !selectedTag) {
        resultsInfo.textContent = `Mostrando todas las entradas (${visibleCount}).`;
      } else {
        resultsInfo.textContent = `Resultados visibles: ${visibleCount}.`;
      }
    }

    searchInput.addEventListener("input", updateFilters);
    tagFilter.addEventListener("change", updateFilters);

    updateFilters();
  </script>
</body>
</html>
